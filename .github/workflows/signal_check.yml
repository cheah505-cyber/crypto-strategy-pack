name: Signal Check
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
concurrency:
  group: signal-check
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pandas numpy ccxt
      - run: python tools/fetch_latest.py
      - run: python tools/paper_trade.py > paper_output.txt
      - run: python tools/manual_signal.py > signal_output.txt
      - name: Commit paper trade state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f paper_trade/ data/eth_usdt_4h.csv data/telegram_sent.log || true
          git commit -m "paper trade update $(date -u +%Y-%m-%dT%H:%M)" || true
          git push || true
      - name: Send Telegram
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash tools/send_telegram.sh signal_output.txt paper_output.txt data/telegram_sent.log
